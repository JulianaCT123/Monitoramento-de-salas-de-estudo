<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento de Salas</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>
    <h1>Sistema de Monitoramento de Salas de Estudo</h1>
    <p>Verifique quais salas estão disponíveis em tempo real</p>
</header>

<main>

        <div class="contador-card">
            📊 Salas Disponíveis:
            <span id="contador-salas">0</span>
        </div>

        <div class="estatisticas">

            <div class="stat-box">
                <h3>Total</h3>
                <span id="total-salas">0</span>
            </div>

            <div class="stat-box">
                <h3>Disponíveis</h3>
                <span id="salas-livres">0</span>
            </div>

            <div class="stat-box">
                <h3>Ocupadas</h3>
                <span id="salas-ocupadas">0</span>
            </div>

        </div>

        <p id="ultima-atualizacao">
            Última atualização: --
        </p>

        <div class="historico-card">

            <h2>📋 Histórico de Eventos</h2>

            <ul id="lista-historico">

                <li>Nenhum evento registrado.</li>

            </ul>

        </div>

        <section id="salas-container"></section>

</main>

<script src="js/script.js"></script>

</body>

</html>
